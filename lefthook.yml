pre-push:
  piped: true
  commands:
    clean-tree:
      priority: 0
      run: git diff --quiet && git diff --cached --quiet
      fail_text: "Push rejected: uncommitted changes exist. Commit or stash them first."
    submodule-check:
      priority: 1
      run: bash scripts/check-submodules.sh
    cargo-fmt:
      priority: 2
      run: cargo fmt --all -- --check
    biome:
      priority: 2
      run: pnpm run lint
    cargo-clippy:
      priority: 3
      run: cargo clippy -p celox -p celox-macros -p celox-napi -p celox-ts-gen --all-targets
    test:
      priority: 4
      run: pnpm test
